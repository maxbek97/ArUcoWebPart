version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ar_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - diploma_ar_network

  backend:
    build: .
    container_name: ar_backend
    restart: always
    env_file:
      - .env
    depends_on:
      - db
    ports:
    - "8000:8000"
    networks:
      - diploma_ar_network

  frontend:
    build:
      context: ../ArUcoWebAdminPart
    container_name: ar_frontend
    restart: always
    ports:
    - "81:80"
    depends_on:
    - backend
    networks:
      - diploma_ar_network

volumes:
  postgres_data:

networks:
  diploma_ar_network: