version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ar_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    container_name: ar_backend
    env_file:
      - .env
    depends_on:
      - db
    ports:
    - "8000:8000"